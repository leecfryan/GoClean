upstream app     { server app:3000; }
upstream admin   { server admin:3001; }
upstream api     { server api:5000; }
upstream auth    { server auth:5001; }

server {
  listen 80;

  location /api/auth/ {
    proxy_pass         http://auth/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  location /api/ {
    proxy_pass         http://api/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # Admin SPA — keep the /admin prefix so CRA assets resolve correctly
  location /admin {
    proxy_pass         http://admin;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
  }

  location / {
    proxy_pass         http://app;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
  }
}
