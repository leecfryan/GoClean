name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, auth, companies, reviews]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/goclean-${{ matrix.service }}:latest

  build-and-push-frontends:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: app
            context: ./app
            image: goclean-app
          - name: admin
            context: ./admin
            image: goclean-admin

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/${{ matrix.image }}:latest

  build-and-push-nginx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/goclean-nginx:latest
